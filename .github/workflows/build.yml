# Build storefront Docker image using GitHub Secrets for Medusa key and backend URL.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY  - Publishable API key (e.g. pk_...)
#   MEDUSA_BACKEND_URL                  - Backend API URL (e.g. https://api.example.com)
#     Optional: if not set, set MEDUSA_BACKEND_URL at runtime (e.g. docker run -e or K8s).

name: Build storefront

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
            MEDUSA_BACKEND_URL=${{ secrets.MEDUSA_BACKEND_URL }}
          cache-from: type=gha
          cache-to: type=gha
