# Build storefront Docker image and push to Docker Hub.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY  - Publishable API key (e.g. pk_...)
#   MEDUSA_BACKEND_URL                  - Optional. Backend API URL; else set at runtime (e.g. K8s).
#   DOCKER_HUB_USERNAME                 - Docker Hub username (e.g. efirshey)
#   DOCKER_HUB_TOKEN                    - Docker Hub access token (Settings → Security → Access Tokens)
#
# Pushed to: Docker Hub
#   Image: <DOCKER_HUB_USERNAME>/medusa-frontend:latest  and  :<commit-sha>
#   e.g.  efirshey/medusa-frontend:latest  →  docker pull efirshey/medusa-frontend:latest

name: Build storefront

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/medusa-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/medusa-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
            MEDUSA_BACKEND_URL=${{ secrets.MEDUSA_BACKEND_URL }}
          cache-from: type=gha
          cache-to: type=gha
